groups:
  - name: aqi_alerts
    interval: 5m
    rules:
      - alert: ISPUCritical
        expr: ispu_avg > 200
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "ISPU Kritis di {{ $labels.station_id }}"
          description: >
            ISPU di stasiun {{ $labels.station_id }} mencapai
            {{ $value | humanize }} — kategori Sangat Tidak Sehat / Berbahaya.

      - alert: ISPUWarning
        expr: ispu_avg > 100
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "ISPU Warning di {{ $labels.station_id }}"
          description: >
            ISPU di stasiun {{ $labels.station_id }} mencapai
            {{ $value | humanize }} — kategori Tidak Sehat.

      - alert: HighPM25
        expr: pm25_avg > 55.4
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "PM2.5 Tinggi di {{ $labels.station_id }}"
          description: >
            PM2.5 di stasiun {{ $labels.station_id }} mencapai
            {{ $value | humanize }} µg/m³ (melebihi baku mutu ISPU 24 jam).

      - alert: KafkaDown
        expr: up{job="kafka-exporter"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Kafka Exporter Down"
          description: "Kafka exporter tidak merespon selama 2 menit."

      - alert: PostgresDown
        expr: up{job="postgres-exporter"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL Exporter Down"
          description: "PostgreSQL exporter tidak merespon selama 2 menit."

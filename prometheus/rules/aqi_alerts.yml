groups:
  - name: aqi_alerts
    rules:

      # Alert ketika PM2.5 rata-rata melebihi 75 selama 15 menit
      - alert: PM25Tinggi
        expr: avg(aqi_pm25_avg) by (station) > 75
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "PM2.5 tinggi di {{ $labels.station }}"
          description: "PM2.5 rata-rata {{ $value }} μg/m³ (threshold: 75) selama 15 menit."

      # Alert ketika PM2.5 sangat berbahaya
      - alert: PM25Berbahaya
        expr: avg(aqi_pm25_avg) by (station) > 150
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "BERBAHAYA! PM2.5 sangat tinggi di {{ $labels.station }}"
          description: "PM2.5 rata-rata {{ $value }} μg/m³ — kategori BERBAHAYA!"

      # Alert ketika Kafka consumer lag tinggi
      - alert: KafkaConsumerLagTinggi
        expr: kafka_consumer_group_lag > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag tinggi"
          description: "Consumer lag mencapai {{ $value }} record — pipeline mungkin lambat."

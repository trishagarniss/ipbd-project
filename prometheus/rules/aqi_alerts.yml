groups:
  - name: aqi_alerts
    interval: 5m
    rules:
      - alert: AQICritical
        expr: european_aqi_avg > 80
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "AQI Kritis di {{ $labels.station_id }}"
          description: >
            European AQI di stasiun {{ $labels.station_id }} mencapai
            {{ $value | humanize }} — masuk kategori Tidak Sehat / Berbahaya.

      - alert: AQIWarning
        expr: european_aqi_avg > 60
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "AQI Warning di {{ $labels.station_id }}"
          description: >
            European AQI di stasiun {{ $labels.station_id }} mencapai
            {{ $value | humanize }} — kategori Kurang Sehat.

      - alert: HighPM25
        expr: pm25_avg > 50
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "PM2.5 Tinggi di {{ $labels.station_id }}"
          description: >
            PM2.5 di stasiun {{ $labels.station_id }} mencapai
            {{ $value | humanize }} µg/m³.

      - alert: KafkaDown
        expr: up{job="kafka-exporter"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Kafka Exporter Down"
          description: "Kafka exporter tidak merespon selama 2 menit."

      - alert: PostgresDown
        expr: up{job="postgres-exporter"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL Exporter Down"
          description: "PostgreSQL exporter tidak merespon selama 2 menit."

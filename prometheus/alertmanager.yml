route:
  group_by: ["alertname", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "telegram"

receivers:
  - name: "telegram"
    webhook_configs:
      - url: "https://api.telegram.org/bot8845729053:AAEIYal8hIan1JBSJCV6Z9R761bC-VoBsus/sendMessage?chat_id=-5185045013&text={{ .GroupLabels.alertname }}&parse_mode=Markdown"
        send_resolved: true

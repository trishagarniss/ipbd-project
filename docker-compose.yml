x-airflow-common:
  &airflow-common
  build:
    context: ./build
    dockerfile: Dockerfile.airflow
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__LOGGING_LEVEL: INFO
    TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    AIRFLOW_CONN_SPARK_DEFAULT: spark://spark-master:7077
    MINIO_ENDPOINT: http://minio:9000
    MLFLOW_URI: http://mlflow:5000
  volumes:
    - ./.env:/opt/airflow/.env
    - ./.env:/opt/.env
    - /var/run/docker.sock:/var/run/docker.sock:rw
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./spark:/opt/airflow/spark
    - ./ml:/opt/ml
    - ./ml:/opt/airflow/ml
    - ./config:/opt/airflow/config
  networks:
    - aqi-net
  depends_on:
    postgres:
      condition: service_healthy

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - aqi-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - aqi-net

  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/setup.sql:/docker-entrypoint-initdb.d/setup.sql
    networks:
      - aqi-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - aqi-net

  spark-master:
    build:
      context: ./build
      dockerfile: Dockerfile.spark
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=aqi_db
      - POSTGRES_USER=${POSTGRES_USER:-aqi_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password123}
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/aqi_db
      - KAFKA_BOOTSTRAP=kafka:29092
      - KAFKA_TOPIC=air-quality-raw
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-admin123}
      - MLFLOW_URI=http://mlflow:5000
      - HOME=/tmp
      - PYTHONPATH=/home/spark/.local/lib/python3.11/site-packages
    ports:
      - "8081:8080"
      - "7077:7077"
    volumes:
      - ./spark:/opt/airflow/spark
    networks:
      - aqi-net

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USER:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-admin123}

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    restart: unless-stopped
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  prometheus:
    image: prom/prometheus:v2.49.0
    container_name: prometheus
    ports:
      - "9090:9090" 
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules:/etc/prometheus/rules
    networks:
      - aqi-net

  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - aqi-net

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - aqi-net

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.8.1
    container_name: mlflow
    ports:
      - "5000:5000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/mlflow_db
      MLFLOW_DEFAULT_ARTIFACT_ROOT: s3://mlflow/
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    command: |
      sh -c "
      pip install psycopg2-binary --quiet &&
      python << 'PYEOF'
      import psycopg2, os
      conn = psycopg2.connect(
          host='postgres',
          dbname='postgres',
          user=os.environ['POSTGRES_USER'],
          password=os.environ['POSTGRES_PASSWORD'],
      )
      conn.autocommit = True
      cur = conn.cursor()
      cur.execute(\"SELECT 1 FROM pg_database WHERE datname = 'mlflow_db'\")
      if not cur.fetchone():
          cur.execute('CREATE DATABASE mlflow_db')
          print('Created mlflow_db')
      cur.close()
      conn.close()
      PYEOF
      mlflow server --host 0.0.0.0 --port 5000 --allowed-hosts '*'
      "
    volumes:
      - mlflow_data:/mlflow
    networks:
      - aqi-net
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  spark-worker:
    build:
      context: ./build
      dockerfile: Dockerfile.spark
    container_name: spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/aqi_db
      - KAFKA_BOOTSTRAP=kafka:29092
      - KAFKA_TOPIC=air-quality-raw
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-admin123}
      - MLFLOW_URI=http://mlflow:5000
      - HOME=/tmp
      - PYTHONPATH=/home/spark/.local/lib/python3.11/site-packages
    volumes:
      - ./spark:/opt/airflow/spark
      - ./ml:/opt/airflow/ml
    networks:
      - aqi-net
    depends_on:
      - spark-master

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    networks:
      - aqi-net
    depends_on:
      postgres:
        condition: service_healthy

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    restart: unless-stopped
    ports:
      - "9308:9308"
    command:
      - --kafka.server=kafka:9092
    networks:
      - aqi-net
    depends_on:
      kafka:
        condition: service_healthy

networks:
  aqi-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  grafana_data:
  mlflow_data:

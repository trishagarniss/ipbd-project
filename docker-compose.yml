version: '3.8'

services:
  # === DATABASE POSTGRESQL ===
  postgres:
    image: postgres:15
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./setup.sh:/docker-entrypoint-initdb.d/setup.sh

  # === APACHE AIRFLOW (BATCH ENGINE) ===
  airflow:
    image: apache/airflow:2.8.1
    restart: always
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./gx:/opt/airflow/gx
    environment:
      - _PIP_ADDITIONAL_REQUIREMENTS=great_expectations pandas sqlalchemy psycopg2-binary
    command: standalone

volumes:
  postgres_data: